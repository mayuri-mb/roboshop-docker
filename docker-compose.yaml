services:
  catalogue:
    build: ./catalogue
    image: mayurim334/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build: ./user
    image: mayurim334/user:1.0.0 
    container_name: user
    depends_on:
    - redis
    - mongodb 
  cart:
    build: ./cart
    image: mayurim334/cart:1.0.0
    container_name: cart
    depends_on:
    - redis
    - catalogue
  frontend:
    build: ./frontend
    image: mayurim334/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user 
    - cart   
  mongodb:
    build: ./mongodb #it moves to mongodb directory 
    image: mayurim334/mongodb:1.0.0 #docker build -d mayurim334/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis
  mysql:
    build: ./mysql
    image: mayurim334/mysql:1.0.0
    container_name: mysql
networks:
  default:
    driver: bridge
    name: roboshop
    external: false #if true, we need to create network manually, else it will only create network




